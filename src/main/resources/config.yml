command-names:
  create: create
  remove: remove
  move: move
  addowner: addowner
  addmember: addmember
  removeowner: removeowner
  removemember: removemember
  reload: reload

permissions:
  admin: "hiiela.staff"

messages:
  no_permission: "<red>You do not have permission to use this command."
  player_only: "<red>This command can only be run by a player."
  invalid_args: "<red>Invalid arguments."
  region_created: "<green>Region <yellow>%region_name%</yellow> created for <yellow>%player_name%</yellow>!</green>"
  region_overlap: "<red>Your selection overlaps with an existing region!</red>"
  no_selection: "<red>You must make a WorldEdit selection first!</red>"
  region_removed: "<green>Region <yellow>%region_name%</yellow> removed successfully!</green>"
  region_not_found: "<red>Region not found!</red>"
  region_moved: "<green>Region <yellow>%region_name%</yellow> moved to new selection!</green>"
  owner_added: "<green>Added <yellow>%player_name%</yellow> as owner to <yellow>%region_name%</yellow>!</green>"
  member_added: "<green>Added <yellow>%player_name%</yellow> as member to <yellow>%region_name%</yellow>!</green>"
  owner_removed: "<green>Removed <yellow>%player_name%</yellow> as owner from <yellow>%region_name%</yellow>!</green>"
  member_removed: "<green>Removed <yellow>%player_name%</yellow> as member from <yellow>%region_name%</yellow>!</green>"
  not_owner: "<red>You are not an owner of this region!</red>"
  staff_help_message: "<gold>--- HiielaProtect Help ---</gold><br><yellow>/kaitse create &lt;player&gt;</yellow><br><yellow>/kaitse remove &lt;player|#region|@here&gt;</yellow><br><yellow>/kaitse move &lt;player|#region&gt;</yellow><br><yellow>/kaitse addowner &lt;player&gt; [#region]</yellow><br><yellow>/kaitse removeowner &lt;player&gt; [#region]</yellow><br><yellow>/kaitse addmember &lt;player&gt; [#region]</yellow><br><yellow>/kaitse removemember &lt;player&gt; [#region]</yellow><br><yellow>/kaitse reload</yellow>"
  player_help_message: ""
  usage_create: "<red>Usage: /kaitse create <player></red>"
  usage_remove: "<red>Usage: /kaitse remove <player|#region|@here></red>"
  usage_move: "<red>Usage: /kaitse move <player|#region></red>"
  usage_addowner: "<red>Usage: /kaitse addowner <player> [#region]</red>"
  usage_removeowner: "<red>Usage: /kaitse removeowner <player> [#region]</red>"
  usage_addmember: "<red>Usage: /kaitse addmember <player> [#region]</red>"
  usage_removemember: "<red>Usage: /kaitse removemember <player> [#region]</red>"
  cannot_remove_yourself: "<red>Iseennast ei saa alalt eemaldada!"
  target_already_added: "<red>See mängija on juba alale lisatud."
  target_not_added: "<red>Seda mängijat ei ole alale lisatud."
  plugin_reloaded: "<green>HiielaProtect configuration reloaded successfully!</green>"

commands_before_create: []

commands_on_create:
  - "execute as %command_runner% run rg flag -w %world% %region_name% greeting Sisenesid %region_name% alale."
  - "execute as %command_runner% run rg flag -w %world% %region_name% farewell Lahkusid %region_name% alalt."